<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Coberturas</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

   
   
  
<div class="bg-dark text-white p-3 shadow mb-4">
    <div class="container d-flex gap-5 flex-wrap">

      
        <div class="menu-group">
            <a href="index.html"
               class="fw-bold text-warning text-decoration-none">
                🏠 Inicio
            </a>
        </div>

    
        <div class="menu-group" id="menuConfiguracion">

            <div class="fw-bold text-warning"
                 style="cursor:pointer"
                 onclick="toggleGroup('configuracionMenu')">
                ⚙ Configuración
            </div>

            <div id="configuracionMenu" class="mt-2 d-none">

                <a href="usuarios.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Usuarios
                </a>

                <a href="coberturas.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Coberturas
                </a>

                <a href="planes.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Planes
                </a>

                <a href="plan_coberturas.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Plan Coberturas
                </a>

            </div>
        </div>

        <div class="menu-group" id="menuClientes">
            <a href="clientes.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Clientes
            </a>
        </div>

        <div class="menu-group" id="menuCotizaciones">
            <a href="cotizaciones.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Cotizaciones
            </a>
        </div>

        <div class="menu-group" id="menuPolizas">
            <a href="polizas.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Pólizas
            </a>
        </div>

        <div class="menu-group" id="menuSiniestros">
            <a href="siniestros.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Siniestros
            </a>
        </div>

    </div>
</div>

    <!-- CONTENIDO -->
    <div class="container mt-4">

        <h2>Gestión de Coberturas</h2>

        <div class="card mb-4 p-3">
            <input type="hidden" id="id_cobertura">

            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" id="nombre" class="form-control" placeholder="Nombre">
                </div>

                <div class="col-md-4">
                    <input type="text" id="descripcion" class="form-control" placeholder="Descripción">
                </div>

                <div class="col-md-2">
                    <input type="number" id="monto_maximo" class="form-control" placeholder="Monto Máximo">
                </div>

                <div class="col-md-2">
                    <button onclick="guardarCobertura()" class="btn btn-primary w-100">
                        Guardar
                    </button>
                </div>
            </div>
        </div>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Monto Máximo</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaCoberturas"></tbody>
        </table>

    </div>
<script>

    function toggleGroup(id) {

        const menu = document.getElementById(id);

        if (menu.classList.contains('d-none')) {

            menu.classList.remove('d-none');

        } else {

            menu.classList.add('d-none');

        }
    }

    // OBTENER ROL
    const idRol = parseInt(sessionStorage.getItem('idRol'));

    /*
        1 = Todo
        2 = Solo Configuración
        3 = Solo Gestión SIN Siniestros
        4 = Solo Siniestros
    */

    // ROL 2
    if (idRol === 2) {

        document.getElementById('menuClientes').style.display = 'none';
        document.getElementById('menuPolizas').style.display = 'none';
        document.getElementById('menuCotizaciones').style.display = 'none';
        document.getElementById('menuSiniestros').style.display = 'none';

    }

    // ROL 3
    else if (idRol === 3) {

        // Ocultar configuración
        document.getElementById('menuConfiguracion').style.display = 'none';

        // Ocultar SOLO siniestros
        document.getElementById('menuSiniestros').style.display = 'none';

    }

    // ROL 4
    else if (idRol === 4) {

        // Ocultar configuración
        document.getElementById('menuConfiguracion').style.display = 'none';

        // Ocultar clientes
        document.getElementById('menuClientes').style.display = 'none';

        // Ocultar pólizas
        document.getElementById('menuPolizas').style.display = 'none';

        // Ocultar cotizaciones
        document.getElementById('menuCotizaciones').style.display = 'none';

    }

</script>
    <script>
        const API_URL = 'http://127.0.0.1:8000/api/coberturas';

        const token = sessionStorage.getItem('access_token');

        if (!token) {
            window.location.href = 'login.html';
        }

        // MENÚ DESPLEGABLE
        function toggleGroup(id) {
            const menu = document.getElementById(id);

            if (menu.classList.contains('d-none')) {
                menu.classList.remove('d-none');
            } else {
                menu.classList.add('d-none');
            }
        }

        async function cargarCoberturas() {

            const res = await fetch(API_URL, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            const data = await res.json();

            const tabla = document.getElementById('tablaCoberturas');

            tabla.innerHTML = data.map(c => `
                <tr>
                    <td>${c.id_cobertura}</td>
                    <td>${c.nombre}</td>
                    <td>${c.descripcion || ''}</td>
                    <td>${c.monto_maximo}</td>
                    <td>
                        <button 
                            onclick="editarCobertura(${c.id_cobertura}, '${c.nombre}', '${c.descripcion}', ${c.monto_maximo})" 
                            class="btn btn-warning btn-sm">
                            Editar
                        </button>

                        <button 
                            onclick="eliminarCobertura(${c.id_cobertura})" 
                            class="btn btn-danger btn-sm">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function guardarCobertura() {

            const id = document.getElementById('id_cobertura').value;

            const data = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                monto_maximo: document.getElementById('monto_maximo').value
            };

            const method = id ? 'PUT' : 'POST';

            const url = id
                ? `${API_URL}/${id}`
                : API_URL;

            await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(data)
            });

            limpiarForm();

            cargarCoberturas();
        }

        function editarCobertura(id, nombre, desc, monto) {

            document.getElementById('id_cobertura').value = id;

            document.getElementById('nombre').value = nombre;

            document.getElementById('descripcion').value = desc;

            document.getElementById('monto_maximo').value = monto;
        }

        async function eliminarCobertura(id) {

            if (confirm('¿Eliminar esta cobertura?')) {

                await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                cargarCoberturas();
            }
        }

        function limpiarForm() {

            document.getElementById('id_cobertura').value = '';

            document.getElementById('nombre').value = '';

            document.getElementById('descripcion').value = '';

            document.getElementById('monto_maximo').value = '';
        }

        cargarCoberturas();
    </script>

</body>
</html>
