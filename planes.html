    <div class="container mt-4">

<script>
  
    function toggleGroup(id) {

        const menu = document.getElementById(id);

        if (menu.classList.contains('d-none')) {

            menu.classList.remove('d-none');

        } else {

            menu.classList.add('d-none');

        }
    }

    // OBTENER ROL
    const idRol = parseInt(sessionStorage.getItem('idRol'));

    /*
        1 = Todo
        2 = Solo Configuración
        3 = Solo Gestión SIN Siniestros
        4 = Solo Siniestros
    */

    if (idRol === 2) {

        
    document.getElementById('menuClientes').style.display = 'none';
    document.getElementById('menuPolizas').style.display = 'none';
    document.getElementById('menuCotizaciones').style.display = 'none';
    document.getElementById('menuSiniestros').style.display = 'none';
    

    }

    
    else if (idRol === 3) {

        
        document.getElementById('menuConfiguracion').style.display = 'none';

      
        document.getElementById('menuSiniestros').style.display = 'none';

    }

   
else if (idRol === 4) {

    
    document.getElementById('menuConfiguracion').style.display = 'none';
    document.getElementById('menuClientes').style.display = 'none';
    document.getElementById('menuPolizas').style.display = 'none';
    document.getElementById('menuCotizaciones').style.display = 'none';
    
    
}

</script>
    <script>
        

        const API_URL = 'http://127.0.0.1:8000/api/planes';

        const token = sessionStorage.getItem('access_token');

        if (!token) {
            window.location.href = 'login.html';
        }

        // // MENÚ DESPLEGABLE
        // function toggleGroup(id) {

        //     const menu = document.getElementById(id);

        //     if (menu.classList.contains('d-none')) {
        //         menu.classList.remove('d-none');
        //     } else {
        //         menu.classList.add('d-none');
        //     }
        // }

        async function cargarRegistros() {

            const res = await fetch(API_URL, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            const data = await res.json();

            const tabla = document.getElementById('tablaPlanes');

            tabla.innerHTML = data.map(p => `
                <tr>
                    <td>${p.id_plan}</td>
                    <td>${p.nombre}</td>
                    <td>${p.descripcion}</td>
                    <td>${p.precio}</td>
                    <td>${p.limite_edad}</td>
                    <td>
                        <button 
                            onclick="editarRegistro(${p.id_plan}, '${p.nombre}', '${p.descripcion}', ${p.precio}, ${p.limite_edad})" 
                            class="btn btn-warning btn-sm">
                            Editar
                        </button>

                        <button 
                            onclick="eliminarRegistro(${p.id_plan})" 
                            class="btn btn-danger btn-sm">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function guardarRegistro() {

            const id = document.getElementById('id').value;

            const data = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: document.getElementById('precio').value,
                limite_edad: document.getElementById('limite_edad').value
            };

            const method = id ? 'PUT' : 'POST';

            const url = id
                ? `${API_URL}/${id}`
                : API_URL;

            await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(data)
            });

            limpiarForm();

            cargarRegistros();
        }

        function editarRegistro(id, nombre, desc, precio, edad) {

            document.getElementById('id').value = id;

            document.getElementById('nombre').value = nombre;

            document.getElementById('descripcion').value = desc;

            document.getElementById('precio').value = precio;

            document.getElementById('limite_edad').value = edad;
        }

        async function eliminarRegistro(id) {

            if (confirm('¿Eliminar este plan?')) {

                await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                cargarRegistros();
            }
        }

        function limpiarForm() {

            document.getElementById('id').value = '';

            document.getElementById('nombre').value = '';

            document.getElementById('descripcion').value = '';

            document.getElementById('precio').value = '';

            document.getElementById('limite_edad').value = '';
        }

        cargarRegistros();






    </script>
