<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pólizas</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

   
<div class="bg-dark text-white p-3 shadow mb-4">
    <div class="container d-flex gap-5 flex-wrap">

        
        <div class="menu-group">
            <a href="index.html"
               class="fw-bold text-warning text-decoration-none">
                🏠 Inicio
            </a>
        </div>

        
        <div class="menu-group" id="menuConfiguracion">

            <div class="fw-bold text-warning"
                 style="cursor:pointer"
                 onclick="toggleGroup('configuracionMenu')">
                ⚙ Configuración
            </div>

            <div id="configuracionMenu" class="mt-2 d-none">

                <a href="usuarios.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Usuarios
                </a>

                <a href="coberturas.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Coberturas
                </a>

                <a href="planes.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Planes
                </a>

                <a href="plan_coberturas.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Plan Coberturas
                </a>

            </div>
        </div>

        
        <div class="menu-group" id="menuClientes">
            <a href="clientes.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Clientes
            </a>
        </div>

        
        <div class="menu-group" id="menuCotizaciones">
            <a href="cotizaciones.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Cotizaciones
            </a>
        </div>

        
        <div class="menu-group" id="menuPolizas">
            <a href="polizas.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Pólizas
            </a>
        </div>

        
        <div class="menu-group" id="menuSiniestros">
            <a href="siniestros.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Siniestros
            </a>
        </div>

    </div>
</div>

    <div class="container mt-4">

        <h2>Gestión de Pólizas</h2>

        <div class="card mb-4 p-3">

            <input type="hidden" id="id_poliza">

            
            <div class="row g-3 mb-3">

                <div class="col-md-12">

                    <label class="form-label">
                        Cotización Asociada
                    </label>

                    <select id="id_cotizacion"
                            class="form-select">
                    </select>

                </div>

            </div>

            
            <div class="row g-3">

                <div class="col-md-3">

                    <label class="form-label">
                        Número de Póliza
                    </label>

                    <input type="text"
                           id="numero_poliza"
                           class="form-control"
                           placeholder="Autogenerado"
                           readonly>

                </div>

                <div class="col-md-3">

                    <label class="form-label">
                        Fecha Emisión
                    </label>

                    <input type="date"
                           id="fecha_emision"
                           class="form-control">

                </div>

                <div class="col-md-3">

                    <label class="form-label">
                        Fecha Vencimiento
                    </label>

                    <input type="date"
                           id="fecha_vencimiento"
                           class="form-control">

                </div>

                <div class="col-md-3">

                    <label class="form-label">
                        Activa
                    </label>

                    <select id="activa"
                            class="form-select">

                        <option value="1">
                            Sí
                        </option>

                        <option value="0">
                            No
                        </option>

                    </select>

                </div>

            </div>

            
            <div class="row mt-3">

                <div class="col-md-12">

                    <button onclick="guardarPoliza()"
                            class="btn btn-primary w-100">

                        Guardar Póliza

                    </button>

                </div>

            </div>

        </div>

        
        <table class="table table-striped table-bordered bg-white">

            <thead class="table-dark">

                <tr>
                    <th>Nº Póliza</th>
                    <th>Cliente</th>
                    <th>Plan</th>
                    <th>Fecha Emisión</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody id="tablaPolizas"></tbody>

        </table>

    </div>
<script>

    
    function toggleGroup(id) {

        const menu = document.getElementById(id);

        if (menu.classList.contains('d-none')) {

            menu.classList.remove('d-none');

        } else {

            menu.classList.add('d-none');

        }
    }

    
    const idRol = parseInt(sessionStorage.getItem('idRol'));

    /*
        1 = Todo
        2 = Solo Configuración
        3 = Solo Gestión SIN Siniestros
        4 = Solo Siniestros
    */

    // ROL 2
    if (idRol === 2) {

        document.getElementById('menuClientes').style.display = 'none';
        document.getElementById('menuPolizas').style.display = 'none';
        document.getElementById('menuCotizaciones').style.display = 'none';
        document.getElementById('menuSiniestros').style.display = 'none';

    }

    // ROL 3
    else if (idRol === 3) {

        // Ocultar configuración
        document.getElementById('menuConfiguracion').style.display = 'none';

        // Ocultar SOLO siniestros
        document.getElementById('menuSiniestros').style.display = 'none';

    }

    // ROL 4
    else if (idRol === 4) {

        // Ocultar configuración
        document.getElementById('menuConfiguracion').style.display = 'none';

        // Ocultar clientes
        document.getElementById('menuClientes').style.display = 'none';

        // Ocultar pólizas
        document.getElementById('menuPolizas').style.display = 'none';

        // Ocultar cotizaciones
        document.getElementById('menuCotizaciones').style.display = 'none';

    }

</script>
<script>

    
    function toggleGroup(id) {

        const menu = document.getElementById(id);

        if (menu.classList.contains('d-none')) {

            menu.classList.remove('d-none');

        } else {

            menu.classList.add('d-none');
        }
    }

    const API_BASE = 'http://127.0.0.1:8000/api';

    const token = sessionStorage.getItem('access_token');

    if (!token) {
        window.location.href = 'login.html';
    }

    const HEADERS = {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': `Bearer ${token}`
    };

    async function cargarDatos() {

        try {

            const [resPolizas, resCotizaciones] = await Promise.all([

                fetch(`${API_BASE}/polizas-detalle`, {
                    headers: HEADERS
                }).then(r => r.json()),

                fetch(`${API_BASE}/cotizaciones`, {
                    headers: HEADERS
                }).then(r => r.json())
            ]);

            
            const selectCotizacion =
                document.getElementById('id_cotizacion');

            selectCotizacion.innerHTML =
                resCotizaciones.map(c => `

                    <option value="${c.id_cotizacion}">

                        Cotización #${c.id_cotizacion}
                        -
                        ${c.cliente ? c.cliente.nombre : 'Sin nombre'}

                    </option>

                `).join('');

            
            document.getElementById('tablaPolizas').innerHTML =
                resPolizas.map(p => `

                    <tr>

                        <td>
                            ${p.numero_poliza}
                        </td>

                        <td>
                            ${p.nombre_cliente || 'N/A'}
                        </td>

                        <td>
                            ${p.nombre_plan || 'N/A'}
                        </td>

                        <td>
                            ${p.fecha_emision}
                        </td>

                        <td>

                            <button
                                onclick="editarPoliza(${p.id_poliza})"
                                class="btn btn-warning btn-sm">

                                Editar

                            </button>

                            <button
                                onclick="eliminarPoliza(${p.id_poliza})"
                                class="btn btn-danger btn-sm">

                                Eliminar

                            </button>

                        </td>

                    </tr>

                `).join('');

        } catch (error) {

            console.error("Error al cargar datos:", error);

            alert("No se pudieron cargar los datos. Revisa la consola (F12).");
        }
    }

    
    async function guardarPoliza() {

        const id = document.getElementById('id_poliza').value;

        const data = {

            id_cotizacion:
                document.getElementById('id_cotizacion').value,

            fecha_emision:
                document.getElementById('fecha_emision').value,

            fecha_vencimiento:
                document.getElementById('fecha_vencimiento').value,

            activa:
                document.getElementById('activa').value
        };

        const url = id
            ? `${API_BASE}/polizas/${id}`
            : `${API_BASE}/polizas`;

        try {

            const res = await fetch(url, {

                method: id ? 'PUT' : 'POST',

                headers: HEADERS,

                body: JSON.stringify(data)
            });

            const responseData = await res.json();

            console.log("STATUS:", res.status);

            console.log("RESPUESTA:", responseData);

            if (!res.ok) {

                alert(JSON.stringify(responseData, null, 2));

                return;
            }

            document.getElementById('id_poliza').value = '';

            alert("Guardado correctamente");

            cargarDatos();

        } catch (error) {

            alert("Error de conexión con el servidor");

            console.error(error);
        }
    }

    
    async function editarPoliza(id) {

        try {

            const res = await fetch(
                `${API_BASE}/polizas/${id}`,
                {
                    headers: HEADERS
                }
            );

            const p = await res.json();

            document.getElementById('id_poliza').value =
                p.id_poliza;

            document.getElementById('id_cotizacion').value =
                p.id_cotizacion;

            document.getElementById('numero_poliza').value =
                p.numero_poliza;

            document.getElementById('fecha_emision').value =
                p.fecha_emision;

            document.getElementById('fecha_vencimiento').value =
                p.fecha_vencimiento;

            document.getElementById('activa').value =
                p.activa ? "1" : "0";

        } catch (error) {

            alert("No se pudo cargar la póliza para editar.");
        }
    }

    
    async function eliminarPoliza(id) {

        if (confirm('¿Eliminar esta póliza?')) {

            await fetch(`${API_BASE}/polizas/${id}`, {

                method: 'DELETE',

                headers: HEADERS
            });

            cargarDatos();
        }
    }

    
    cargarDatos();

</script>

</body>
</html>
