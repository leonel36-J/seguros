<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Plan-Cobertura</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="bg-dark text-white p-3 shadow mb-4">
    <div class="container d-flex gap-5 flex-wrap">

       
        <div class="menu-group">
            <a href="index.html"
               class="fw-bold text-warning text-decoration-none">
                🏠 Inicio
            </a>
        </div>

        
        <div class="menu-group" id="menuConfiguracion">

            <div class="fw-bold text-warning"
                 style="cursor:pointer"
                 onclick="toggleGroup('configuracionMenu')">
                ⚙ Configuración
            </div>

            <div id="configuracionMenu" class="mt-2 d-none">

                <a href="usuarios.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Usuarios
                </a>

                <a href="coberturas.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Coberturas
                </a>

                <a href="planes.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Planes
                </a>

                <a href="plan_coberturas.html"
                   class="d-block text-white text-decoration-none mb-1">
                    Plan Coberturas
                </a>

            </div>
        </div>

       
        <div class="menu-group" id="menuClientes">
            <a href="clientes.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Clientes
            </a>
        </div>

        
        <div class="menu-group" id="menuCotizaciones">
            <a href="cotizaciones.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Cotizaciones
            </a>
        </div>

        
        <div class="menu-group" id="menuPolizas">
            <a href="polizas.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Pólizas
            </a>
        </div>

     
        <div class="menu-group" id="menuSiniestros">
            <a href="siniestros.html"
               class="fw-bold text-warning text-decoration-none">
                📋 Siniestros
            </a>
        </div>

    </div>
</div>

    <!-- CONTENIDO -->
    <div class="container mt-4">

        <h2>Gestión de Relación Plan-Cobertura</h2>

        <!-- Formulario -->
        <div class="card mb-4 p-3">

            <input type="hidden" id="id">

            <div class="row g-2">

                <div class="col-md-3">
                    <label for="id_plan" class="form-label">Plan</label>

                    <select id="id_plan" class="form-select">
                        <option value="">Seleccione un Plan...</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="id_cobertura" class="form-label">Cobertura</label>

                    <select id="id_cobertura" class="form-select">
                        <option value="">Seleccione Cobertura...</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="monto_cubierto" class="form-label">Monto Cubierto</label>

                    <input type="number"
                           id="monto_cubierto"
                           class="form-control"
                           placeholder="Monto Cubierto">
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <button onclick="guardarRegistro()"
                            class="btn btn-primary w-100">
                        Guardar
                    </button>
                </div>

            </div>
        </div>

        <!-- Tabla -->
        <table class="table table-striped table-bordered bg-white">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Plan</th>
                    <th>Cobertura</th>
                    <th>Monto Cubierto</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaPlanCobertura"></tbody>

        </table>

    </div>
<script>

    // MENÚ DESPLEGABLE
    function toggleGroup(id) {

        const menu = document.getElementById(id);

        if (menu.classList.contains('d-none')) {

            menu.classList.remove('d-none');

        } else {

            menu.classList.add('d-none');

        }
    }

    // OBTENER ROL
    const idRol = parseInt(sessionStorage.getItem('idRol'));

    /*
        1 = Todo
        2 = Solo Configuración
        3 = Solo Gestión SIN Siniestros
        4 = Solo Siniestros
    */

    // ROL 2
    if (idRol === 2) {

        document.getElementById('menuClientes').style.display = 'none';
        document.getElementById('menuPolizas').style.display = 'none';
        document.getElementById('menuCotizaciones').style.display = 'none';
        document.getElementById('menuSiniestros').style.display = 'none';

    }

    // ROL 3
    else if (idRol === 3) {

        // Ocultar configuración
        document.getElementById('menuConfiguracion').style.display = 'none';

        // Ocultar SOLO siniestros
        document.getElementById('menuSiniestros').style.display = 'none';

    }

    // ROL 4
    else if (idRol === 4) {

        // Ocultar configuración
        document.getElementById('menuConfiguracion').style.display = 'none';

        // Ocultar clientes
        document.getElementById('menuClientes').style.display = 'none';

        // Ocultar pólizas
        document.getElementById('menuPolizas').style.display = 'none';

        // Ocultar cotizaciones
        document.getElementById('menuCotizaciones').style.display = 'none';

    }

</script>
    <script>

        // MENÚ DESPLEGABLE
        function toggleGroup(id) {

            const menu = document.getElementById(id);

            if (menu.classList.contains('d-none')) {
                menu.classList.remove('d-none');
            } else {
                menu.classList.add('d-none');
            }
        }

        const API_URL = 'http://127.0.0.1:8000/api/plan-coberturas';

        const API_URL_DETALLE = 'http://127.0.0.1:8000/api/plan-coberturas-detalle';

        const token = sessionStorage.getItem('access_token');

        if (!token) {
            window.location.href = 'login.html';
        }

        const HEADERS = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };

        let coberturasDisponibles = [];

        // 1. Cargar Planes
        async function cargarSelects() {

            const resPlanes = await fetch(
                'http://127.0.0.1:8000/api/planes',
                { headers: HEADERS }
            );

            const planes = await resPlanes.json();

            const selectPlan = document.getElementById('id_plan');

            planes.forEach(p => {

                selectPlan.innerHTML += `
                    <option value="${p.id_plan}">
                        ${p.nombre}
                    </option>
                `;
            });
        }

        // 2. Cargar Coberturas
        async function cargarCoberturasDelPlan(planId) {

            const selectCob = document.getElementById('id_cobertura');

            // Resetear
            selectCob.innerHTML = '<option value="">Seleccione Cobertura...</option>';

            document.getElementById('monto_cubierto').value = '';

            if (planId) {

                const res = await fetch(
                    `http://127.0.0.1:8000/api/plan-coberturas/plan/${planId}`,
                    { headers: HEADERS }
                );

                coberturasDisponibles = await res.json();

                coberturasDisponibles.forEach(c => {

                    selectCob.innerHTML += `
                        <option value="${c.id_cobertura}">
                            ${c.nombre}
                        </option>
                    `;
                });
            }
        }

        // Cambio de Plan
        document.getElementById('id_plan').addEventListener('change', function () {

            cargarCoberturasDelPlan(this.value);
        });

        // Autocompletar Monto
        document.getElementById('id_cobertura').addEventListener('change', function () {

            const cobId = this.value;

            const item = coberturasDisponibles.find(
                c => c.id_cobertura == cobId
            );

            if (item) {

                document.getElementById('monto_cubierto').value =
                    item.monto_maximo;
            }
        });

        // Tabla
        async function cargarRegistros() {

            const res = await fetch(
                API_URL_DETALLE,
                { headers: HEADERS }
            );

            const data = await res.json();

            const tabla = document.getElementById('tablaPlanCobertura');

            tabla.innerHTML = data.map(pc => `
                <tr>
                    <td>${pc.id}</td>
                    <td>${pc.nombre}</td>
                    <td>${pc.nombrecobertura}</td>
                    <td>${pc.monto_cubierto}</td>

                    <td>

                        <button
                            onclick="editarRegistro(
                                ${pc.id},
                                ${pc.id_plan},
                                ${pc.id_cobertura},
                                '${pc.monto_cubierto}'
                            )"
                            class="btn btn-warning btn-sm">

                            Editar

                        </button>

                        <button
                            onclick="eliminarRegistro(${pc.id})"
                            class="btn btn-danger btn-sm">

                            Eliminar

                        </button>

                    </td>
                </tr>
            `).join('');
        }

        // Guardar
        async function guardarRegistro() {

            const id = document.getElementById('id').value;

            const data = {

                id_plan: document.getElementById('id_plan').value,

                id_cobertura: document.getElementById('id_cobertura').value,

                monto_cubierto: document.getElementById('monto_cubierto').value
            };

            const method = id ? 'PUT' : 'POST';

            const url = id
                ? `${API_URL}/${id}`
                : API_URL;

            const response = await fetch(url, {

                method: method,

                headers: HEADERS,

                body: JSON.stringify(data)
            });

            if (response.ok) {

                limpiarForm();

                cargarRegistros();

            } else {

                alert("Error al guardar, verifica los datos.");
            }
        }

        // Editar
        async function editarRegistro(id, id_plan, id_cobertura, monto) {

            document.getElementById('id').value = id;

            document.getElementById('id_plan').value = id_plan;

            // Esperar carga
            await cargarCoberturasDelPlan(id_plan);

            document.getElementById('id_cobertura').value = id_cobertura;

            document.getElementById('monto_cubierto').value = monto;
        }

        // Eliminar
        async function eliminarRegistro(id) {

            if (confirm('¿Eliminar registro?')) {

                await fetch(`${API_URL}/${id}`, {

                    method: 'DELETE',

                    headers: HEADERS
                });

                cargarRegistros();
            }
        }

        // Limpiar
        function limpiarForm() {

            document.getElementById('id').value = '';

            document.getElementById('id_plan').value = '';

            document.getElementById('id_cobertura').innerHTML =
                '<option value="">Seleccione Cobertura...</option>';

            document.getElementById('monto_cubierto').value = '';
        }

        // Inicializar
        cargarSelects();

        cargarRegistros();

    </script>

</body>
</html>
